<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机名字抽奖系统（无重复）</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f4f7f9;
            color: #333;
        }
        h1 {
            color: #4a90e2;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #555;
        }
        #display {
            font-size: 48px;
            font-weight: bold;
            color: #e94e77;
            margin: 50px 0;
            height: 60px;
            line-height: 60px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
            margin: 0 auto 30px;
            transition: color 0.3s;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px;
        }
        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 30px;
            font-size: 28px;
            color: #28a745;
            font-weight: bold;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>随机名字抽奖系统（无重复）</h1>
    <p>点击开始，名字会快速随机切换，然后逐渐慢下来停在幸运儿上。抽中后移除，不会重复。点击重置恢复原列表。关闭页面后自动重置。</p>
    <button id="startButton" onclick="startLottery()">开始抽奖</button>
    <button id="resetButton" onclick="resetLottery()">重置</button>
    <div id="display">准备中...</div>
    <div id="result"></div>

    <script>
        let isRunning = false;
        const builtinNames = [
            '陈炜裕', '钟业豪', '曾幸文', '余应峻', '苏现', '江赞洋', '蓝海平', '黄宗毅', '李方晋', '陈维渝',
            '黄欣儿', '陈家熙', '周煜轩', '李祖源', '杨锦城', '陈国伦', '刘颖仪', '霍颖怡', '梁宏-', '欧诺焰',
            '董晓-', '朱洛轩', '董李宗', '梁一芯', '龙惠敏', '张俊然', '张子晴', '陈俊安', '曾明轩', '曾庆航',
            '许芷豪', '欧心怡', '冯振晖', '欧楚怡', '黄海琪', '陈家俊', '陈鸿玮', '程学倪', '曾梓宁',
            '黎敏玲', '江沩健', '陈家涛', '邵泽滔', '陈勇达', '欧洁鸿', '林宗泽', '王仙华', '陈治妍', '陈钰婧',
            '谢沛业', '梁肇涛', '谭皓天', '谭焯文', '陆烨-', '陈姻尹', '钟有扬', '雷智宇', '张子寅', '陈学成', '---'
            
        ];
        let originalNames = [];
        let remainingNames = [];
        let intervalId;
        let currentSpeed = 20; // 初始速度
        let shuffledList = []; // 洗牌列表
        let displayIndex = 0; // 当前显示索引

        // 使用 sessionStorage 保存数据，会话结束时自动清除
        function loadData() {
            const storedOriginal = sessionStorage.getItem('originalNames');
            const storedRemaining = sessionStorage.getItem('remainingNames');

            if (storedOriginal) {
                originalNames = JSON.parse(storedOriginal);
                remainingNames = storedRemaining ? JSON.parse(storedRemaining) : [...originalNames];
            } else {
                originalNames = [...builtinNames];
                remainingNames = [...originalNames];
                saveData();
            }
            updateDisplay('准备中...');
        }

        function saveData() {
            sessionStorage.setItem('originalNames', JSON.stringify(originalNames));
            sessionStorage.setItem('remainingNames', JSON.stringify(remainingNames));
        }

        function updateDisplay(text) {
            document.getElementById('display').textContent = text;
        }

        function getRandomIndex(length) {
            const array = new Uint32Array(1);
            crypto.getRandomValues(array);
            return array[0] % length; // 切换回真随机
        }

        // Fisher-Yates shuffle 函数
        function shuffle(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = getRandomIndex(i + 1);
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startLottery() {
            if (isRunning) return;

            if (remainingNames.length === 0) {
                alert('所有名字已抽完！请重置。');
                return;
            }

            document.getElementById('startButton').disabled = true;
            document.getElementById('result').textContent = '';
            isRunning = true;
            currentSpeed = 20;
            displayIndex = 0;

            // 预选最终赢家
            const winnerIndex = getRandomIndex(remainingNames.length);
            const winner = remainingNames[winnerIndex];

            // 洗牌剩余名字
            shuffledList = shuffle(remainingNames);

            // 开始顺序切换洗牌列表
            intervalId = setInterval(() => {
                updateDisplay(shuffledList[displayIndex]);
                displayIndex = (displayIndex + 1) % shuffledList.length;
            }, currentSpeed);

            // 逐渐减速
            let slowdownInterval = setInterval(() => {
                currentSpeed += 100;
                clearInterval(intervalId);
                if (currentSpeed > 400) {
                    // 停下来
                    clearInterval(slowdownInterval);
                    updateDisplay(winner);
                    document.getElementById('result').textContent = `中奖者：${winner} 🎉`;
                    // 移除抽中的名字
                    remainingNames.splice(remainingNames.indexOf(winner), 1);
                    saveData();
                    isRunning = false;
                    document.getElementById('startButton').disabled = false;
                } else {
                    // 继续切换，但速度变慢
                    intervalId = setInterval(() => {
                        updateDisplay(shuffledList[displayIndex]);
                        displayIndex = (displayIndex + 1) % shuffledList.length;
                    }, currentSpeed);
                }
            }, 500);
        }

        function resetLottery() {
            remainingNames = [...originalNames];
            saveData();
            document.getElementById('result').textContent = '';
            updateDisplay('准备中...');
            alert('已重置！');
        }

        // 加载数据
        loadData();
    </script>
</body>
</html>
